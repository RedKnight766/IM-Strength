<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Strength">
<title>Ironman Strength Tracker</title>
<style>
:root {
  --blue-d:#0C447C; --blue-l:#E6F1FB;
  --green-d:#0F6E56; --green-l:#E1F5EE;
  --amber-d:#854F0B; --amber-l:#FAEEDA;
  --coral-d:#993C1D; --coral-l:#FAECE7;
  --pink-d:#993556; --pink-l:#FBEAF0;
  --purp-d:#3C3489; --purp-l:#EEEDFE;
  --gray:#666666; --lgray:#F5F5F5; --mgray:#DDDDDD; --dgray:#333333;
  --bg:#FAFAFA;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html,body { margin:0; padding:0; min-height:100%; background:var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  color: var(--dgray); overscroll-behavior:none; }
#app { display:flex; flex-direction:column; min-height:100vh; max-width:480px; margin:0 auto;
  background:#fff; }

/* Header */
#topbar { padding: 14px 14px 8px 14px; background:var(--blue-d); color:#fff; }
#topbar .row1 { display:flex; justify-content:space-between; align-items:center; font-size:12px; opacity:0.85; }
#topbar .row2 { display:flex; justify-content:space-between; align-items:baseline; margin-top:4px; }
#topbar h1 { font-size:20px; margin:0; font-weight:700; }
#topbar .sec { font-size:13px; font-weight:600; color:#FFD9A8; }
#progressBar { height:4px; background:rgba(255,255,255,0.25); border-radius:2px; margin-top:8px; overflow:hidden; }
#progressFill { height:100%; background:#fff; border-radius:2px; transition:width .25s; }

/* Scroll area */
#content { flex:1 1 auto; overflow-y:auto; padding: 10px 14px 8px 14px; -webkit-overflow-scrolling:touch; min-height:0; }

.section-label { font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  color:var(--gray); margin: 14px 0 6px 0; display:flex; align-items:center; gap:6px; }
.section-label .dot { width:8px; height:8px; border-radius:50%; }

.warmup-box { font-size:13px; color:var(--gray); background:var(--lgray); border-radius:10px;
  padding:10px 12px; line-height:1.4; }

/* Exercise cards */
.ex-card { border:1px solid var(--mgray); border-radius:12px; padding:12px; margin-bottom:10px; background:#fff; }
.ex-head { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:6px; }
.ex-name { font-size:15px; font-weight:700; line-height:1.3; }
.ex-eq { font-size:12px; color:var(--gray); font-style:italic; margin-top:2px; }
.ex-badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.badge-bilateral { background:var(--blue-l); color:var(--blue-d); }
.badge-unilateral { background:var(--green-l); color:var(--green-d); }
.badge-secondary { background:var(--amber-l); color:var(--amber-d); }
.ex-sets { font-size:13px; color:var(--gray); margin:4px 0 10px 0; font-weight:600; }

.input-row { display:flex; gap:8px; }
.input-group { flex:1; }
.input-group label { font-size:10px; color:var(--gray); font-weight:600; text-transform:uppercase;
  letter-spacing:.04em; display:block; margin-bottom:3px; }
.input-group input, .input-group textarea {
  width:100%; border:1px solid var(--mgray); border-radius:8px; padding:8px 10px;
  font-size:15px; font-family:inherit; background:#fcfcfc; color:var(--dgray);
}
.input-group input:focus, .input-group textarea:focus { outline:2px solid var(--blue-d); border-color:var(--blue-d); }
.input-group textarea { resize:none; height:38px; }
.weight-input { max-width:90px; }
.last-time { font-size:11px; color:#999; margin-top:5px; }

/* Met con */
.metcon-box { background:var(--coral-l); border-radius:12px; padding:12px; }
.metcon-title { font-size:11px; font-weight:700; color:var(--coral-d); letter-spacing:.05em; margin-bottom:4px; }
.metcon-text { font-size:14px; line-height:1.45; color:var(--dgray); }
.metcon-kit { font-size:12px; color:var(--gray); font-style:italic; margin-top:6px; }
.metcon-notes { margin-top:10px; }

.note-box { font-size:12px; color:var(--gray); font-style:italic; background:var(--lgray);
  border-radius:10px; padding:9px 11px; margin: 8px 0 4px 0; line-height:1.4; }

/* Bottom bar */
#bottombar { padding: 10px 14px 16px 14px;
  background:#fff; border-top:1px solid var(--mgray); display:flex; gap:10px; }
.nav-btn { flex:0 0 52px; border:1px solid var(--mgray); border-radius:12px; background:#fff;
  font-size:20px; color:var(--gray); display:flex; align-items:center; justify-content:center; }
.nav-btn:active { background:var(--lgray); }
#completeBtn { flex:1; border:none; border-radius:12px; background:var(--green-d); color:#fff;
  font-size:16px; font-weight:700; padding:14px; }
#completeBtn:active { background:#0a5544; }

/* Focus color accents per muscle group */
.focus-squat   #topbar { background:var(--amber-d); }
.focus-chest   #topbar { background:var(--blue-d); }
.focus-deadlift#topbar { background:var(--coral-d); }
.focus-shoulders #topbar { background:var(--green-d); }
.focus-frontsquat #topbar { background:var(--pink-d); }
.focus-back    #topbar { background:var(--purp-d); }

.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:var(--dgray); color:#fff; padding:10px 18px; border-radius:24px;
  font-size:14px; font-weight:600; opacity:0; transition:opacity .3s, transform .3s;
  pointer-events:none; z-index:50; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(-6px); }

.day-pill { font-size:11px; background:rgba(255,255,255,0.18); padding:2px 8px; border-radius:10px; }
</style>
</head>
<body>
<div id="app" class="">
  <div id="topbar">
    <div class="row1">
      <span id="blockLabel">Block 1 · Weeks 1–3</span>
      <span class="day-pill" id="dayPill">Day 1 / 36</span>
    </div>
    <div class="row2">
      <h1 id="focusTitle">Squat</h1>
      <span class="sec" id="secTitle">+ Biceps</span>
    </div>
    <div id="progressBar"><div id="progressFill"></div></div>
  </div>

  <div id="content">
    <div class="section-label"><span class="dot" style="background:#EF9F27"></span>Warm-up</div>
    <div class="warmup-box" id="warmupText"></div>

    <div class="section-label"><span class="dot" style="background:#1D9E75"></span>Superset — 4 rounds, 90s rest</div>
    <div id="exercisesContainer"></div>

    <div class="note-box" id="noteText"></div>

    <div class="section-label"><span class="dot" style="background:#D85A30"></span>Met con (10 min)</div>
    <div class="metcon-box">
      <div class="metcon-title">MET CON · 10 MIN</div>
      <div class="metcon-text" id="metconText"></div>
      <div class="metcon-kit" id="metconKit"></div>
      <div class="metcon-notes">
        <div class="input-group">
          <label>Met con notes</label>
          <textarea id="metconNotes" placeholder="Rounds completed, time, RPE..."></textarea>
        </div>
      </div>
    </div>
    <div style="height:12px"></div>
  </div>

  <div id="bottombar">
    <button class="nav-btn" id="prevBtn" aria-label="Previous day">‹</button>
    <button id="completeBtn">Mark Completed → Next</button>
    <button class="nav-btn" id="nextBtn" aria-label="Next day">›</button>
  </div>
</div>
<div class="toast" id="toast"></div>

const FOCUS_LABELS = {
  squat: 'Squat', chest: 'Chest', deadlift: 'Deadlift',
  shoulders: 'Shoulders', frontsquat: 'Front Squat', back: 'Back'
};
const ROLE_BADGE = {
  'Bilateral': ['BILAT','badge-bilateral'],
  'Unilateral': ['UNILAT','badge-unilateral'],
  'Unilateral-led': ['UNILAT','badge-unilateral'],
  'Secondary': ['2ND','badge-secondary']
};

const STORAGE_KEY = 'ironStrength_currentDay';
const LOG_KEY = 'ironStrength_logs'; // { "dayIdx-exName": {weight, notes, ts} }

let currentDay = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
if (isNaN(currentDay) || currentDay < 0 || currentDay >= PROGRAM.length) currentDay = 0;

let logs = {};
try { logs = JSON.parse(localStorage.getItem(LOG_KEY) || '{}'); } catch(e) { logs = {}; }

function logKey(dayIdx, exName) { return dayIdx + '::' + exName; }
function metconLogKey(dayIdx) { return dayIdx + '::metcon'; }

function fmtDate(ts) {
  const d = new Date(ts);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function render() {
  const day = PROGRAM[currentDay];
  const app = document.getElementById('app');
  app.className = 'focus-' + day.focus;

  document.getElementById('blockLabel').textContent =
    'Block ' + day.block + ' · ' + day.blockWk.replace(/^Weeks \d+–\d+ — /, '');
  document.getElementById('dayPill').textContent = 'Day ' + (currentDay+1) + ' / ' + PROGRAM.length;
  document.getElementById('focusTitle').textContent = FOCUS_LABELS[day.focus] || day.focus;
  document.getElementById('secTitle').textContent = '+ ' + day.secondary;
  document.getElementById('progressFill').style.width = ((currentDay+1)/PROGRAM.length*100) + '%';
  document.getElementById('warmupText').textContent = day.warmup;
  document.getElementById('noteText').innerHTML = '<b>Note:</b> ' + day.note;
  document.getElementById('metconText').textContent = day.metcon;
  document.getElementById('metconKit').textContent = 'Kit: ' + day.metconEquip;

  // Exercises
  const container = document.getElementById('exercisesContainer');
  container.innerHTML = '';
  day.exercises.forEach((ex, i) => {
    const [badgeTxt, badgeClass] = ROLE_BADGE[ex.role] || ['', ''];
    const card = document.createElement('div');
    card.className = 'ex-card';

    const key = logKey(currentDay, ex.n);
    const lastEntry = logs[key];

    let lastTimeHtml = '';
    if (lastEntry) {
      const parts = [];
      if (lastEntry.weight) parts.push(lastEntry.weight);
      if (lastEntry.notes) parts.push('"' + lastEntry.notes + '"');
      lastTimeHtml = '<div class="last-time">Last (' + fmtDate(lastEntry.ts) + '): ' +
        (parts.length ? parts.join(' · ') : '—') + '</div>';
    }

    card.innerHTML = `
      <div class="ex-head">
        <div>
          <div class="ex-name">${ex.n}</div>
          <div class="ex-eq">${ex.eq}</div>
        </div>
        <div class="ex-badge ${badgeClass}">${badgeTxt}</div>
      </div>
      <div class="ex-sets">${ex.s}</div>
      <div class="input-row">
        <div class="input-group" style="flex:0 0 90px">
          <label>Weight</label>
          <input type="text" inputmode="decimal" class="weight-input" data-ex="${i}" data-field="weight"
                 placeholder="lb" value="${lastEntry ? (lastEntry.weight||'') : ''}">
        </div>
        <div class="input-group">
          <label>Notes</label>
          <textarea data-ex="${i}" data-field="notes" placeholder="RPE, form, feel...">${lastEntry ? (lastEntry.notes||'') : ''}</textarea>
        </div>
      </div>
      ${lastTimeHtml}
    `;
    container.appendChild(card);
  });

  // Met con notes — prefill from last entry for this day
  const mcKey = metconLogKey(currentDay);
  const mcLast = logs[mcKey];
  document.getElementById('metconNotes').value = mcLast ? (mcLast.notes || '') : '';

  document.getElementById('content').scrollTop = 0;
}

function saveCurrentInputs() {
  const day = PROGRAM[currentDay];
  const container = document.getElementById('exercisesContainer');
  day.exercises.forEach((ex, i) => {
    const weightInput = container.querySelector(`input[data-ex="${i}"][data-field="weight"]`);
    const notesInput = container.querySelector(`textarea[data-ex="${i}"][data-field="notes"]`);
    const weight = weightInput ? weightInput.value.trim() : '';
    const notes = notesInput ? notesInput.value.trim() : '';
    if (weight || notes) {
      logs[logKey(currentDay, ex.n)] = { weight, notes, ts: Date.now() };
    }
  });
  const mcNotes = document.getElementById('metconNotes').value.trim();
  if (mcNotes) {
    logs[metconLogKey(currentDay)] = { notes: mcNotes, ts: Date.now() };
  }
  localStorage.setItem(LOG_KEY, JSON.stringify(logs));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1400);
}

function goTo(idx, save=true) {
  if (save) saveCurrentInputs();
  currentDay = ((idx % PROGRAM.length) + PROGRAM.length) % PROGRAM.length;
  localStorage.setItem(STORAGE_KEY, String(currentDay));
  render();
}

document.getElementById('completeBtn').addEventListener('click', () => {
  saveCurrentInputs();
  const wrapping = currentDay === PROGRAM.length - 1;
  goTo(currentDay + 1, false);
  showToast(wrapping ? 'Rotation complete — back to Day 1! 🎉' : 'Saved! On to Day ' + (currentDay+1));
});
document.getElementById('prevBtn').addEventListener('click', () => goTo(currentDay - 1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(currentDay + 1));

render();

// Save on page hide (in case user closes app without tapping Completed)
window.addEventListener('pagehide', saveCurrentInputs);
window.addEventListener('beforeunload', saveCurrentInputs);
</script>
</body>
</html>
